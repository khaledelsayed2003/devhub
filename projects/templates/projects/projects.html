{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4 fw-bold">Projects</h1>

    <div class="table-responsive">
        <table class="table table-hover table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Project</th>
                    <th>Positive Votes</th>
                    <th>Total Votes</th>
                    <th>Created</th>
                    <th></th>
                    <th></th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for project in projects %}
                <tr>
                    <td class="fw-semibold">{{ project.title }}</td>
                    <td>
                        <div class="progress" style="height: 20px;">
                            <div class="progress-bar bg-success" style="width: {{ project.vote_ratio }}%">
                                {{ project.vote_ratio }}%
                            </div>
                        </div>
                    </td>
                    <td>{{ project.vote_total }}</td>
                    <td>{{ project.created|date:"M d, Y" }}</td>
                    <td>
                        <a href="{% url 'update-project' project.id %}" class="btn btn-sm btn-info">Update</a>
                    </td>
                    <td>
                        <a href="{% url 'delete-project' project.id %}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                    <td>
                        <a href="{% url 'project' project.id %}" class="btn btn-sm btn-primary">View</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock content %}
