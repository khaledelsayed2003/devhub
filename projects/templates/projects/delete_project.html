{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm border-danger">
        <div class="card-body p-5 text-center">

            <div class="mb-3" style="font-size: 3rem;">⚠️</div>

            <h3 class="fw-bold mb-2">Delete Project</h3>
            <p class="text-muted mb-1">You are about to delete:</p>
            <h5 class="fw-bold text-danger mb-4">"{{ project.title }}"</h5>
            <p class="text-muted small mb-4">This action cannot be undone.</p>

            <form action="" method="POST">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{% url 'projects' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock content %}
