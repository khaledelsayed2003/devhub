{% extends 'base.html' %}

{% block content %}

<h1>Project Form</h1>

<form action="{% url 'create-project' %}" method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="text-danger small mt-1">{{ field.errors }}</div>
        {% endif %}
    </div>
    {% endfor %}
    <input type="submit">
</form>

{% endblock content %}
